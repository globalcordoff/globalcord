<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Globalcord Installer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0b10;
      --surface: #12141b;
      --surface-soft: #171a22;
      --surface-strong: #1b1f29;
      --border: #252a36;
      --text: #eceff6;
      --muted: #9ea7ba;
      --accent: #6d7ff2;
      --accent-hover: #7d8df5;
      --success: #43c485;
      --warn: #e2a74b;
      --danger: #ef6a7b;
      --shadow: 0 22px 46px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: "Segoe UI", Inter, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(700px 360px at -5% -10%, rgba(109, 127, 242, 0.16), transparent 65%),
        radial-gradient(540px 300px at 102% 2%, rgba(84, 95, 178, 0.15), transparent 70%),
        var(--bg);
      user-select: none;
    }

    button,
    input {
      font: inherit;
    }

    .shell {
      width: min(1020px, calc(100vw - 30px));
      height: calc(100vh - 30px);
      margin: 15px auto;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(18, 20, 27, 0.98), rgba(16, 18, 24, 0.98));
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .titlebar {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px 0 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(13, 15, 20, 0.9);
      backdrop-filter: blur(8px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo {
      width: 28px;
      height: 28px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      white-space: nowrap;
    }

    .version {
      min-width: 56px;
      padding: 3px 9px;
      border: 1px solid #334060;
      border-radius: 999px;
      background: rgba(109, 127, 242, 0.1);
      color: #c2ccff;
      font-size: 11px;
      font-weight: 700;
      text-align: center;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .version.loaded { opacity: 1; }

    .title-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .icon-button,
    .window-button {
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.16s ease;
    }

    .icon-button {
      width: 32px;
      height: 30px;
      display: grid;
      place-items: center;
    }

    .window-button {
      width: 30px;
      height: 24px;
      position: relative;
    }

    .icon-button:hover,
    .window-button:hover {
      background: var(--surface-strong);
      border-color: #2f3645;
      color: var(--text);
    }

    .minimize::before {
      content: "";
      position: absolute;
      left: 9px;
      right: 9px;
      top: 12px;
      height: 2px;
      background: currentColor;
      border-radius: 2px;
    }

    .close::before,
    .close::after {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      top: 11px;
      height: 2px;
      background: currentColor;
      border-radius: 2px;
    }

    .close::before { transform: rotate(45deg); }
    .close::after { transform: rotate(-45deg); }
    .close:hover {
      color: #ffd7dd;
      background: rgba(239, 106, 123, 0.2);
      border-color: rgba(239, 106, 123, 0.38);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 26px 30px 20px;
      min-height: 0;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 22px;
      padding: 18px 20px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(22, 25, 33, 0.9), rgba(18, 20, 27, 0.95));
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.06;
      letter-spacing: 0;
      font-weight: 700;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      max-width: 620px;
    }

    .hero-logo {
      width: 72px;
      height: 72px;
      object-fit: contain;
      image-rendering: pixelated;
      opacity: 0.94;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 12px;
    }

    .section-label {
      color: #c7cfdf;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .manual-toggle,
    .manual-submit {
      border: 1px solid #354055;
      border-radius: 9px;
      background: var(--surface-soft);
      color: #d7deee;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      padding: 9px 13px;
      transition: all 0.16s ease;
    }

    .manual-toggle:hover,
    .manual-submit:hover {
      border-color: #4a5774;
      background: #1d2230;
    }

    .manual-row {
      display: none;
      gap: 8px;
      margin-bottom: 10px;
    }

    .manual-row.visible { display: flex; }

    .manual-row input {
      flex: 1;
      min-width: 0;
      border: 1px solid #333b4e;
      border-radius: 9px;
      background: #10131a;
      color: var(--text);
      outline: none;
      padding: 10px 12px;
      font-size: 12px;
    }

    .manual-row input::placeholder { color: #75809a; }
    .manual-row input:focus {
      border-color: #4b5fd2;
      box-shadow: 0 0 0 3px rgba(109, 127, 242, 0.2);
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 278px;
      overflow: auto;
      padding-right: 4px;
    }

    .list::-webkit-scrollbar { width: 6px; }
    .list::-webkit-scrollbar-thumb {
      background: #3c4456;
      border-radius: 999px;
    }

    .target {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 13px;
      border: 1px solid #2a3040;
      border-radius: 10px;
      background: #131720;
      cursor: pointer;
      transition: all 0.14s ease;
    }

    .target:hover {
      border-color: #435072;
      background: #161c28;
    }

    .target.selected {
      border-color: rgba(109, 127, 242, 0.65);
      background: rgba(109, 127, 242, 0.16);
      box-shadow: inset 0 0 0 1px rgba(109, 127, 242, 0.15);
    }

    .target-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .app-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: #5061dd;
      color: #ffffff;
      font-weight: 800;
      flex: 0 0 auto;
    }

    .app-icon.canary { background: #e4a03f; }
    .app-icon.manual { background: #6d7ff2; }

    .target h3 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
    }

    .path {
      margin-top: 3px;
      color: #95a0b5;
      font-family: Consolas, "JetBrains Mono", monospace;
      font-size: 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 450px;
    }

    .target-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 999px;
      background: #1f2430;
      color: #adb6c9;
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      border: 1px solid #30384a;
      text-transform: lowercase;
    }

    .badge.ok {
      border-color: rgba(67, 196, 133, 0.4);
      color: #74d9a3;
      background: rgba(67, 196, 133, 0.15);
    }

    .badge.warn {
      border-color: rgba(226, 167, 75, 0.4);
      color: #f0bf6e;
      background: rgba(226, 167, 75, 0.14);
    }

    .radio {
      width: 16px;
      height: 16px;
      border: 2px solid #5b657c;
      border-radius: 50%;
    }

    .selected .radio {
      border-color: #8b9af7;
      background: radial-gradient(circle at center, #8b9af7 0 45%, transparent 48%);
    }

    .empty {
      padding: 26px;
      border: 1px dashed #36415a;
      border-radius: 10px;
      color: #97a3bc;
      background: rgba(19, 24, 34, 0.72);
      text-align: center;
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: auto;
    }

    .primary,
    .secondary {
      flex: 1;
      min-height: 45px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      border: 1px solid transparent;
      transition: all 0.16s ease;
    }

    .primary {
      background: var(--accent);
      color: #ffffff;
      border-color: #7f8ef5;
    }

    .primary:hover:not(:disabled) {
      background: var(--accent-hover);
      border-color: #98a5f8;
    }

    .secondary {
      background: #221721;
      border-color: #4e2d43;
      color: #f3b3cb;
    }

    .secondary:hover:not(:disabled) {
      background: #2b1b2b;
      border-color: #694062;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .status {
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 30px;
      border-top: 1px solid var(--border);
      background: rgba(12, 14, 19, 0.88);
      color: var(--muted);
      font-size: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #80889a;
    }

    .dot.loading { background: #8b9af7; }
    .dot.success { background: var(--success); }
    .dot.error { background: var(--danger); }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(7, 9, 13, 0.75);
      z-index: 30;
      backdrop-filter: blur(2px);
    }

    .overlay.visible { display: flex; }

    .modal {
      width: min(460px, calc(100% - 56px));
      border: 1px solid #31394a;
      border-radius: 12px;
      background: #131722;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .modal h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .modal p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .link-grid {
      display: grid;
      gap: 8px;
    }

    .link-button {
      width: 100%;
      text-align: left;
      border: 1px solid #333d50;
      border-radius: 9px;
      background: #171c27;
      color: var(--text);
      cursor: pointer;
      font-weight: 600;
      padding: 11px 12px;
      transition: all 0.16s ease;
    }

    .link-button:hover {
      border-color: #4a5b84;
      background: #1d2433;
    }

    .progress-label {
      display: block;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-family: Consolas, "JetBrains Mono", monospace;
      font-size: 11px;
      margin-bottom: 8px;
    }

    .bar {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #252c3b;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: inherit;
      transition: width 0.25s ease;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="titlebar">
      <div class="brand">
        <img class="logo" src="{{ICON_BASE64}}" alt="">
        <span class="title">Globalcord Installer</span>
        <span class="version" id="version">...</span>
      </div>
      <div class="title-actions">
        <button class="icon-button" onclick="toggleSettings()" title="Links">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15 1.65 1.65 0 0 0 3.09 14H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.4.4.94.6 1.51.6H21a2 2 0 0 1 0 4h-.09c-.57 0-1.11.2-1.51.6z"></path>
          </svg>
        </button>
        <button class="window-button minimize" onclick="window.globalcord.minimizeApp()" title="Minimize"></button>
        <button class="window-button close" onclick="window.globalcord.closeApp()" title="Close"></button>
      </div>
    </div>

    <main>
      <section class="hero">
        <div>
          <h1>Globalcord</h1>
          <p class="subtitle">Select the Discord installation where Globalcord should be installed.</p>
        </div>
        <img class="hero-logo" src="{{ICON_BASE64}}" alt="">
      </section>

      <section>
        <div class="section-head">
          <div class="section-label">Discord installations</div>
          <button class="manual-toggle" onclick="toggleManual()">Manual path</button>
        </div>
        <div class="manual-row" id="manual-row">
          <input id="manual-path" type="text" placeholder="C:\Users\You\AppData\Local\Discord\app-1.0.9171\resources">
          <button class="manual-submit" onclick="addManualPath()">Add</button>
        </div>
        <div class="list" id="discord-list">
          <div class="empty">Searching for Discord installations...</div>
        </div>
      </section>

      <div class="actions">
        <button class="primary" id="btn-inject" disabled onclick="handleInject()">Install Globalcord</button>
        <button class="secondary" id="btn-uninject" disabled onclick="handleUninject()">Uninstall</button>
      </div>
    </main>

    <div class="status">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">Waiting for selection...</span>
    </div>
  </div>

  <div class="overlay" id="progress-overlay">
    <div class="modal">
      <span class="progress-label" id="progress-label">Preparing installation...</span>
      <div class="progress-row">
        <span id="progress-mb"></span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="bar">
        <div class="bar-fill" id="progress-fill"></div>
      </div>
    </div>
  </div>

  <div class="overlay" id="settings-overlay" onclick="closeSettings(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-head">
        <h2>Globalcord links</h2>
        <button class="icon-button" onclick="toggleSettings()" title="Close">x</button>
      </div>
      <p>Open official project links and community resources.</p>
      <div class="link-grid">
        <button class="link-button" onclick="window.globalcord.openUrl('https://discord.gg/globalcord')">Discord server</button>
        <button class="link-button" onclick="window.globalcord.openUrl('https://globalcord.online')">Website</button>
        <button class="link-button" onclick="window.globalcord.openUrl('https://github.com/globalcordoff/globalcord')">GitHub repository</button>
      </div>
    </div>
  </div>

  <script>
    const icons = {
      "Discord": "D",
      "Discord PTB": "PTB",
      "Discord Canary": "C",
      "Discord Dev": "DEV",
      "Manual": "M"
    };
    let discords = [];
    let selected = null;

    function setStatus(type, text) {
      document.getElementById("status-dot").className = `dot ${type}`;
      document.getElementById("status-text").textContent = text;
    }

    function setLoading(visible, text = "Loading...", percent = 100, mbDownloaded = null, mbTotal = null) {
      document.getElementById("progress-overlay").classList.toggle("visible", visible);
      if (!visible) {
        setTimeout(() => document.getElementById("progress-fill").style.width = "0%", 250);
        return;
      }

      const pct = Math.max(0, Math.min(100, Math.round(percent)));
      document.getElementById("progress-label").textContent = text;
      document.getElementById("progress-pct").textContent = `${pct}%`;
      document.getElementById("progress-fill").style.width = `${pct}%`;
      document.getElementById("progress-mb").textContent =
        mbDownloaded !== null && mbTotal !== null ? `${mbDownloaded.toFixed(1)} / ${mbTotal.toFixed(1)} MB` : "";
    }

    function toggleManual() {
      const row = document.getElementById("manual-row");
      row.classList.toggle("visible");
      if (row.classList.contains("visible")) document.getElementById("manual-path").focus();
    }

    async function addManualPath() {
      const input = document.getElementById("manual-path");
      const path = input.value.trim();
      if (!path) return;

      const entry = { name: "Manual", path, asarPath: `${path}\\app.asar`, version: "custom" };
      discords.push(entry);
      await renderList();
      selectDiscord(discords.length - 1);
      input.value = "";
      document.getElementById("manual-row").classList.remove("visible");
    }

    async function loadDiscords() {
      setStatus("loading", "Detecting Discord installations...");
      try {
        discords = await window.globalcord.detectDiscord() || [];
      } catch {
        discords = [];
      }

      await renderList();
      setStatus(discords.length ? "idle" : "error", discords.length ? "Select an installation target." : "No installations found. Use manual path.");
    }

    async function renderList() {
      const list = document.getElementById("discord-list");
      list.innerHTML = "";

      if (!discords.length) {
        list.innerHTML = '<div class="empty">No Discord installations were found automatically. Add the resources folder manually.</div>';
        return;
      }

      for (let i = 0; i < discords.length; i++) {
        const d = discords[i];
        let injected = false;
        let thirdParty = false;

        try { injected = await window.globalcord.isInjected(d.path); } catch {}
        if (!injected) {
          try { thirdParty = await window.globalcord.hasThirdPartyMod(d.path); } catch {}
        }

        const item = document.createElement("div");
        item.className = "target";
        item.dataset.index = i;
        item.dataset.thirdParty = thirdParty ? "1" : "0";
        const badge = injected
          ? '<span class="badge ok">installed</span>'
          : thirdParty
            ? '<span class="badge warn">mod found</span>'
            : '<span class="badge">clean</span>';
        const iconClass = d.name.includes("Canary") ? "canary" : d.name === "Manual" ? "manual" : "";

        item.innerHTML = `
          <div class="target-left">
            <div class="app-icon ${iconClass}">${icons[d.name] || "D"}</div>
            <div>
              <h3>${escapeHtml(d.name)}</h3>
              <div class="path">${escapeHtml(d.path)}</div>
            </div>
          </div>
          <div class="target-right">
            <span class="badge">v${escapeHtml(d.version || "?")}</span>
            ${badge}
            <span class="radio"></span>
          </div>
        `;
        item.addEventListener("click", () => selectDiscord(i));
        list.appendChild(item);
      }
    }

    function selectDiscord(index) {
      selected = discords[index];
      document.querySelectorAll(".target").forEach((node, i) => node.classList.toggle("selected", i === index));
      document.getElementById("btn-inject").disabled = false;
      document.getElementById("btn-uninject").disabled = false;

      const isThirdParty = document.querySelectorAll(".target")[index]?.dataset.thirdParty === "1";
      document.getElementById("btn-inject").textContent = isThirdParty ? "Replace with Globalcord" : "Install Globalcord";
      setStatus(isThirdParty ? "loading" : "idle", isThirdParty
        ? `${selected.name}: another mod was detected. Installing will replace it.`
        : `Selected: ${selected.name}`);
    }

    async function handleInject() {
      if (!selected) return;
      setLoading(true, "Starting installation...", 2);
      setStatus("loading", `Installing into ${selected.name}...`);

      const started = window.globalcord.startInject(selected.path);
      if (!started?.started) {
        setLoading(false);
        setStatus("error", started?.error || "Could not start installation.");
        return;
      }

      const result = await waitForInject();
      if (!result.success) {
        setLoading(false);
        setStatus("error", result.error || "Installation failed.");
        return;
      }

      setLoading(true, "Finalizing installation...", 100);
      setTimeout(async () => {
        setLoading(false);
        setStatus("success", `Globalcord installed into ${selected.name}. Restart Discord.`);
        await loadDiscords();
      }, 600);
    }

    function waitForInject() {
      return new Promise(resolve => {
        const timer = setInterval(() => {
          const status = window.globalcord.getInjectStatus();
          if (status.state === "done") {
            clearInterval(timer);
            resolve({ success: true });
          }
          if (status.state === "error") {
            clearInterval(timer);
            resolve({ success: false, error: status.error });
          }
        }, 500);
      });
    }

    async function handleUninject() {
      if (!selected) return;
      setLoading(true, "Preparing uninstall...", 5);
      setStatus("loading", `Uninstalling from ${selected.name}...`);

      const result = await window.globalcord.uninject(selected.path);
      if (!result.success) {
        setLoading(false);
        setStatus("error", result.error || "Uninstall failed.");
        return;
      }

      setLoading(true, "Done", 100);
      setTimeout(async () => {
        setLoading(false);
        setStatus("success", `Globalcord removed from ${selected.name}.`);
        await loadDiscords();
      }, 600);
    }

    function toggleSettings() {
      document.getElementById("settings-overlay").classList.toggle("visible");
    }

    function closeSettings(event) {
      event.currentTarget.classList.remove("visible");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    async function loadLatestVersion() {
      try {
        const res = await fetch("https://api.github.com/repos/globalcordoff/globalcord/releases/latest", {
          headers: { "Accept": "application/vnd.github.v3+json" }
        });
        if (!res.ok) return;
        const data = await res.json();
        if (!data.tag_name) return;
        const version = document.getElementById("version");
        version.textContent = data.tag_name;
        version.classList.add("loaded");
      } catch {}
    }

    loadDiscords();
    loadLatestVersion();
  </script>
</body>
</html>
